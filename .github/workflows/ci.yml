name: CI

# Minimal permissions for security
permissions:
  contents: read # Read repository contents

# Prevent overlapping CI runs
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: "20"

jobs:
  ci:
    name: CI
    if: ${{ (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep

      - name: Build project
        run: npm run build

      - name: Run linting
        run: npm run lint

      - name: Check Prettier formatting (core)
        run: npx prettier --check "packages/core/src/*.ts"

      - name: Check Prettier formatting (web)
        run: npx prettier --check "packages/web/**/*.ts" "packages/web/**/*.tsx"

      - name: Run tests with coverage
        run: npm run test:coverage

      #- name: Install Playwright dependencies
      #  run: npx playwright install --with-deps chromium

      #- name: Run E2E tests
      #  run: |
      #    cd packages/web
      #    npm run test:playwright:ci

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/lcov.info,./packages/web/coverage/lcov.info
          fail_ci_if_error: false

      - name: Notify completion
        if: always()
        run: |
          echo "CI complete"
