[package]
name = "lace-tui"
version = "0.1.0"
edition = "2021"
license = "UNLICENSED"
publish = false

[dependencies]
base64 = "0.22"
crossterm = "0.28"
ratatui = "0.29"
serde = { version = "1.0", features = ["derive"] }
